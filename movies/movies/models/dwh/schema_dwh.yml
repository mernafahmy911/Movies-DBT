version: 2

models:
  - name: dim_movies
    columns:
      - name: imdb_id
        tests:
          - unique
          - not_null
      - name: title
        tests:
          - not_null
      - name: release_year
        tests:
          - not_null
      - name: genre
        tests:
          - not_null
      - name: director
        tests:
          - not_null
      - name: movie_rank
        tests:
          - unique
          - not_null

  - name: dim_directors
    columns:
      - name: director
        tests:
          - unique
          - not_null
      - name: director_id
        tests:
          - unique
          - not_null
      - name: total_movies
        tests:
          - not_null

  - name: dim_production
    columns:
      - name: production_company
        tests:
          - unique
          - not_null
      - name: id
        tests:
          - unique
          - not_null
      - name: movie_count
        tests:
          - not_null

  - name: fact_movie_scores
    columns:
      - name: imdb_id
        tests:
          - unique
          - not_null
      - name: movie_rank
        tests:
          - unique
          - not_null
      - name: director_id
        tests:
          - not_null
      - name: production_id
        tests:
          - not_null
      - name: release_year
        tests:
          - not_null
      - name: imdb_score_10
        tests:
          - not_null
      - name: imdb_score_100
        tests:
          - not_null
      - name: imdb_votes
        tests:
          - not_null
      - name: rt_critic_rating
        tests:
          - not_null
      - name: rt_critic_reviews
        tests:
          - not_null
      - name: audience_rating
        tests:
          - not_null
      - name: audience_reviews
        tests:
          - not_null
      - name: metacritic_score
        tests:
          - not_null
      - name: letterboxd_score
        tests:
          - not_null
      - name: letterboxd_votes
        tests:
          - not_null
      - name: google_score
        tests:
          - not_null
      - name: flickmetrix_score
        tests:
          - not_null
      - name: custom_score
        tests:
          - not_null